<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 170" font-family="'DM Sans', system-ui, sans-serif" role="img" aria-label="Data-in pipeline: an ADaM dataset is aggregated into a long ARD, which pivot_across widens into a wide data frame that tabular consumes.">
  <defs>
    <style>
      .data    { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; }
      .datalbl { font-size: 12px; fill: #374151; }
      .datasub { font-size: 10.5px; fill: #9ca3af; font-family: 'DM Mono', ui-monospace, monospace; }
      .phase   { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; }
      .phlbl   { font-size: 14px; fill: #1e3a8a; font-weight: 600; }
      .phsub   { font-size: 10.5px; fill: #6b7280; font-family: 'DM Mono', ui-monospace, monospace; }
      .arrow   { stroke: #9ca3af; stroke-width: 1.6; fill: none; }
      .verb    { font-size: 11px; fill: #1e3a8a; font-family: 'DM Mono', ui-monospace, monospace; }
      .act     { font-size: 11px; fill: #6b7280; font-family: 'DM Mono', ui-monospace, monospace; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- ADaM -->
  <rect class="data" x="16" y="58" width="96" height="54" rx="2"/>
  <text class="datalbl" x="64" y="82"  text-anchor="middle">ADaM</text>
  <text class="datasub" x="64" y="100" text-anchor="middle">datasets</text>

  <path class="arrow" d="M 112 85 L 188 85" marker-end="url(#ah)"/>
  <text class="act" x="150" y="76" text-anchor="middle">aggregate</text>

  <!-- ARD -->
  <rect class="data" x="192" y="58" width="76" height="54" rx="2"/>
  <text class="datalbl" x="230" y="82"  text-anchor="middle">ARD</text>
  <text class="datasub" x="230" y="100" text-anchor="middle">(long)</text>

  <path class="arrow" d="M 268 85 L 380 85" marker-end="url(#ah)"/>
  <text class="verb" x="324" y="76" text-anchor="middle">pivot_across()</text>

  <!-- wide frame -->
  <rect class="data" x="384" y="58" width="100" height="54" rx="2"/>
  <text class="datalbl" x="434" y="82"  text-anchor="middle">wide</text>
  <text class="datasub" x="434" y="100" text-anchor="middle">data.frame</text>

  <path class="arrow" d="M 484 85 L 522 85" marker-end="url(#ah)"/>

  <!-- tabular -->
  <rect class="phase" x="524" y="54" width="180" height="62" rx="2"/>
  <text class="phlbl" x="614" y="82"  text-anchor="middle">tabular()</text>
  <text class="phsub" x="614" y="100" text-anchor="middle">|&gt; cols() |&gt; emit()</text>

  <!-- caption -->
  <text x="324" y="104" text-anchor="middle" font-size="11" fill="#9ca3af">long &#8594; wide</text>
</svg>

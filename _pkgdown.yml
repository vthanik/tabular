url: https://vthanik.github.io/tabular/

template:
  bslib:
    primary: "#3b82f6"
    font_scale: 1.2
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

home:
  title: Clinical TFL rendering for R
  description: >
    Native emission of clinical tables, figures, and listings to RTF,
    LaTeX, HTML, PDF, and DOCX from a single dplyr-style API. Decimal
    alignment, group-aware pagination, page tokens.

reference:
- title: Entry points
  desc: Construct the spec.
  contents:
  - tb_table
  - tb_figure

- title: Structure
  desc: Configure columns, rows, and spanning headers.
  contents:
  - tb_cols
  - tb_rows
  - tb_spans

- title: Styling
  desc: Conditional formatting.
  contents:
  - tb_styles

- title: Defaults
  desc: Study-wide rendering presets.
  contents:
  - tb_preset

- title: Markup
  desc: Inline markup that survives string concat.
  contents:
  - tb_mark

- title: Rendering
  desc: Terminal verb -- emit to file.
  contents:
  - tb_render

- title: Demo datasets
  desc: Pre-summarised wide-format tables used by examples and tests.
  contents:
  - has_keyword("demo-data")

articles:
- title: Get started
  navbar: ~
  contents: []

- title: Recipes
  navbar: Recipes
  contents: []

- title: Advanced
  navbar: Advanced
  contents: []

url: https://vthanik.github.io/tabular/

template:
  bootstrap: 5
  bslib:
    primary: "#3b82f6"
    base_font: { google: "DM Sans" }
    heading_font: { google: "DM Sans" }
    code_font: { google: "DM Mono" }
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

home:
  title: Clinical TFL rendering for R
  description: >
    Native emission of clinical submission tables to RTF, LaTeX, HTML,
    PDF, and DOCX. Decimal alignment, multi-level column headers,
    group-aware pagination.

reference:
- title: Entry verbs
  desc: Wrap a pre-summarised wide data frame into a `tabular_spec`.
  contents:
  - tabular
  - pivot_across

- title: Spec building
  desc: Configure per-column display, header bands, sort order, and
        subgrouping. Each verb attaches one slot onto the spec
        and returns the updated spec for chaining.
  contents:
  - cols
  - col_spec
  - headers
  - sort_rows
  - subgroup

- title: Styling
  desc: A single `style()` verb, paired with one of the `cells_*()`
        location helpers, drives every visual rule — body cells,
        headers, footnotes, page chrome, table edges. Build a
        reusable house style with `style_template()` and attach it
        to `preset()` so every downstream table inherits the look.
  contents:
  - style
  - cells
  - style_template
  - brdr

- title: Presets and theming
  desc: Page geometry and cosmetic defaults. `preset()` overrides per
        spec in the pipe; `set_preset()` sets a session default;
        `preset_minimal()` applies a stripped-down look.
  contents:
  - preset
  - set_preset
  - get_preset
  - preset_minimal

- title: Inline markup
  desc: Mark label and cell text as Markdown or HTML.
  contents:
  - md
  - html

- title: Footnotes
  desc: Attach an auto-numbered footnote to any `cells_*()` location. The
        engine assigns the marker once, in reading order, deduped by id,
        and byte-identical across every backend and page.
  contents:
  - footnote

- title: Pagination
  desc: Configure page splits, group-run protection, and horizontal
        panel layout for wide tables. Row budget per page is computed
        by the engine from the active preset and the spec's chrome.
  contents:
  - paginate

- title: Rendering and inspection
  desc: Terminal verbs. `emit()` writes a file; `as_grid()` resolves the
        spec without I/O; `check_fonts()` audits font availability; the
        print and `as.tags()` methods drive the live HTML preview.
  contents:
  - emit
  - as_grid
  - check_fonts
  - print.tabular_spec
  - as.tags.tabular_spec

- title: Predicates
  desc: Class predicates for tabular's S7 objects.
  contents:
  - has_keyword("internal")
  - -starts_with(".col_spec_class")

- title: Demo datasets
  desc: Pre-summarised wide-format tables and their upstream
        `cards`-format counterparts. Power every `@examples` block,
        every vignette, and every smoke test.
  contents:
  - has_keyword("datasets")

articles:
- title: Get started
  navbar: ~
  contents:
  - tabular
  - core-concepts

- title: Recipes
  navbar: Recipes
  contents:
  - columns-and-headers
  - rows-grouping-pagination
  - styling
  - articles/clinical-cookbook

- title: Advanced
  navbar: Advanced
  contents:
  - articles/from-ard
  - articles/fonts-and-fidelity
  - articles/architecture

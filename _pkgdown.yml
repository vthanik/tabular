url: https://vthanik.github.io/tabular/

template:
  bslib:
    primary: "#3b82f6"
    font_scale: 1.2
    border-radius: 0
    btn-border-radius: 3px
    grid-gutter-width: 3rem
    pkgdown-nav-height: 78px

code:
  width: 71

navbar:
  type: light
  bg: none
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

home:
  title: Clinical TFL rendering for R
  description: >
    Native emission of clinical submission tables to RTF, LaTeX, HTML,
    PDF, and DOCX. Decimal alignment, multi-level column headers,
    group-aware pagination.

reference:
- title: Entry verbs
  desc: Wrap a pre-summarised wide data frame into a `tabular_spec`.
  contents:
  - tabular
  - pivot_across

- title: Spec building
  desc: Configure per-column display, header bands, sort order, and
        computed columns. Each verb attaches one slot onto the spec
        and returns the updated spec for chaining.
  contents:
  - cols
  - col_spec
  - headers
  - sort_rows
  - derive

- title: Styling
  desc: Predicate-targeted styling and formatting rules.
  contents:
  - style

- title: Predicates
  desc: Class predicates for tabular's S7 objects.
  contents:
  - has_keyword("internal")
  - -starts_with(".col_spec_class")

- title: Demo datasets
  desc: Pre-summarised wide-format tables and their upstream
        `cards`-format counterparts. Power every `@examples` block,
        every vignette, and every smoke test.
  contents:
  - has_keyword("demo-data")

articles:
- title: Get started
  navbar: ~
  contents: []

- title: Recipes
  navbar: Recipes
  contents: []

- title: Advanced
  navbar: Advanced
  contents: []

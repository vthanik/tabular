# Build the pkgdown site and deploy it to the gh-pages branch.
# Derived from https://github.com/r-lib/actions/tree/v2/examples (pkgdown),
# with Quarto set up because the vignettes / articles are .qmd (mirrors
# this repo's R-CMD-check workflow).
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      # Pin Quarto so the .qmd vignettes / articles render on the runner
      # (same as R-CMD-check.yaml; without it pkgdown's article build aborts).
      - uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. installs tabular so `library(tabular)` + the live
          # knit_print tables resolve while pkgdown renders the .qmd articles.
          extra-packages: any::pkgdown, local::.
          needs: website
          install-quarto: false

      - name: Hide non-site root markdown
        # pkgdown's package_mds() renders every root *.md as a public page
        # and ignores .Rbuildignore. The dev notes (build/debugging/handoff/
        # MEMORY/plan/CLAUDE.local) are gitignored and absent on CI, but
        # CLAUDE.md and cran-comments.md are tracked, so drop them here.
        run: rm -f CLAUDE.md cran-comments.md

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
